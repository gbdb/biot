{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — Jardin bIOT</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1008;
      --bg-deep: #141a0f;
      --green-dark: #3d5c2e;
      --green-mid: #5a8a3f;
      --green-light: #7ab85a;
      --cream: #ede8dc;
      --warm: #c8b99a;
      --amber: #c4832a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--cream);
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-box {
      width: 100%;
      max-width: 360px;
      padding: 2rem;
      background: rgba(0,0,0,0.5);
      border-radius: 16px;
      border: 1px solid rgba(122, 184, 90, 0.2);
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin: 0 0 0.5rem 0;
      color: var(--green-light);
    }
    .subtitle { font-size: 0.9rem; color: var(--warm); margin-bottom: 1.5rem; }
    form { display: flex; flex-direction: column; gap: 1rem; }
    label { font-size: 0.85rem; color: var(--warm); }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(200, 185, 154, 0.3);
      border-radius: 8px;
      background: rgba(13, 16, 8, 0.8);
      color: var(--cream);
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: var(--green-mid);
    }
    button[type="submit"] {
      padding: 0.75rem 1.5rem;
      background: var(--green-dark);
      color: var(--cream);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button[type="submit"]:hover { background: var(--green-mid); }
    .error { color: #e07; font-size: 0.9rem; margin-top: 0.25rem; }
    .logo { font-family: 'Playfair Display', serif; margin-bottom: 2rem; }
    .logo span { color: var(--green-light); }
  </style>
</head>
<body>
  <div class="logo">Jardin <span>bIOT</span></div>
  <div class="login-box">
    <h1>Connexion</h1>
    <p class="subtitle">Accédez à votre vue 3D et vos jardins.</p>
    {% if messages %}
      {% for message in messages %}
        <p class="error">{{ message }}</p>
      {% endfor %}
    {% endif %}
    <form method="post" action="">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <label for="id_username">Nom d'utilisateur</label>
      <input type="text" id="id_username" name="username" required autofocus>
      <label for="id_password">Mot de passe</label>
      <input type="password" id="id_password" name="password" required>
      <button type="submit">Se connecter</button>
    </form>
  </div>
</body>
</html>
