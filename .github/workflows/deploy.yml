name: Deploy BIOT

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /srv/jardinbiot
            git pull origin main
            sudo -u jardinbiot /srv/jardinbiot/.venv/bin/pip install -r requirements.txt
            sudo -u jardinbiot /srv/jardinbiot/.venv/bin/python manage.py migrate
            sudo -u jardinbiot /srv/jardinbiot/.venv/bin/python manage.py collectstatic --noinput
            systemctl restart jardinbiot-gunicorn
